<form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
  <!-- Name Field -->
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Full Name</mat-label>
    <input matInput type="text" formControlName="name" placeholder="John Doe" autocomplete="name">
    <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Name is required.</mat-error>
    <mat-error *ngIf="registerForm.get('name')?.hasError('minlength')">Name must be at least 2 characters.</mat-error>
  </mat-form-field>

  <!-- Email Field -->
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required.</mat-error>
    <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Enter a valid email address.</mat-error>
  </mat-form-field>

  <!-- Password Field -->
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Password</mat-label>
    <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password"
           placeholder="Min 6 characters" autocomplete="new-password">
    <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
      <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required.</mat-error>
    <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Password must be at least 6 characters.</mat-error>
  </mat-form-field>

  <!-- Error Message -->
  <div class="form-error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</div>

  <!-- Success Message -->
  <div class="form-success" *ngIf="successMessage" role="status">{{ successMessage }}</div>

  <!-- Submit Button -->
  <button mat-raised-button color="primary" type="submit" class="btn-submit"
          [disabled]="loading">
    <span *ngIf="!loading">Create Account</span>
    <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
  </button>
</form>
